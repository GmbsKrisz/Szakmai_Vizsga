<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gnöb</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #222;
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        #container {
            position: relative;
            text-align: center;
        }

        #gnob {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #a8e063, #56ab2f);
            border-radius: 50%;
            position: relative;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: wobble 4s ease-in-out infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #gnob:active {
            transform: scale(0.9);
        }

        .eye {
            width: 40px;
            height: 40px;
            background: white;
            border-radius: 50%;
            margin: 0 10px;
            position: relative;
        }

        .pupil {
            width: 15px;
            height: 15px;
            background: black;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: lookAround 5s infinite;
        }

        .mouth {
            width: 60px;
            height: 20px;
            border-bottom: 5px solid #333;
            border-radius: 0 0 30px 30px;
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            transition: height 0.2s;
        }

        #gnob:hover .mouth {
            height: 30px;
            background: #333;
        }

        #bubble {
            position: absolute;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 15px 25px;
            border-radius: 20px;
            font-size: 1.2rem;
            color: #333;
            opacity: 0;
            transition: opacity 0.3s, top 0.3s;
            pointer-events: none;
            white-space: nowrap;
            z-index: 20;
        }

        #bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 10px 10px 0;
            border-style: solid;
            border-color: white transparent transparent transparent;
        }

        @keyframes wobble {

            0%,
            100% {
                border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
                transform: rotate(0deg);
            }

            50% {
                border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%;
                transform: rotate(5deg);
            }
        }

        @keyframes lookAround {

            0%,
            100% {
                transform: translate(-50%, -50%);
            }

            10% {
                transform: translate(-20%, -50%);
            }

            20% {
                transform: translate(-20%, -50%);
            }

            30% {
                transform: translate(-80%, -60%);
            }

            40% {
                transform: translate(-80%, -60%);
            }

            50% {
                transform: translate(-50%, -30%);
            }

            60% {
                transform: translate(-50%, -30%);
            }
        }
    </style>
</head>

<body>

    <div id="container">
        <div id="bubble">Szia, én vagyok Gnöb!</div>
        <div id="gnob">
            <div class="eye">
                <div class="pupil"></div>
            </div>
            <div class="eye">
                <div class="pupil"></div>
            </div>
            <div class="mouth"></div>
        </div>
    </div>

    <script>
        const gnob = document.getElementById('gnob');
        const bubble = document.getElementById('bubble');
        const body = document.body;

        const messages = [
            "Au!",
            "Ez csikiz!",
            "Gnöb éhes!",
            "Ne böködj!",
            "Blöá!",
            "Hagyd abba!",
            "Még! Még!",
            "Szeretem a sütit!",
            "Most elszédültem...",
            "Gnöb. Csak Gnöb.",
            "Mi a helyzet?",
            "Unatkozom."
        ];

        const colors = [
            'linear-gradient(135deg, #a8e063, #56ab2f)', // Zöld
            'linear-gradient(135deg, #ff9966, #ff5e62)', // Narancs
            'linear-gradient(135deg, #56CCF2, #2F80ED)', // Kék
            'linear-gradient(135deg, #F2994A, #F2C94C)', // Sárga
            'linear-gradient(135deg, #e1eec3, #f05053)', // Pirosas
            'linear-gradient(135deg, #8E2DE2, #4A00E0)'  // Lila
        ];

        let messageTimeout;

        function speak(text) {
            bubble.textContent = text;
            bubble.style.opacity = '1';
            bubble.style.top = '-120px';

            clearTimeout(messageTimeout);
            messageTimeout = setTimeout(() => {
                bubble.style.opacity = '0';
                bubble.style.top = '-100px';
            }, 2000);
        }

        gnob.addEventListener('click', () => {
            // Véletlenszerű szín
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            gnob.style.background = randomColor;

            // Véletlenszerű üzenet
            const randomMsg = messages[Math.floor(Math.random() * messages.length)];
            speak(randomMsg);

            // Kis elmozdulás (ugrás)
            const randomX = (Math.random() - 0.5) * 50;
            const randomY = (Math.random() - 0.5) * 50;
            gnob.style.transform = `translate(${randomX}px, ${randomY}px) scale(0.95)`;

            setTimeout(() => {
                gnob.style.transform = 'translate(0, 0) scale(1)';
            }, 200);
        });

        // "Menekülés" ha túl sokat kattintanak rá gyorsan (opcionális vicc)
        let clickCount = 0;
        gnob.addEventListener('click', () => {
            clickCount++;
            if (clickCount > 5) {
                const maxX = window.innerWidth - 250;
                const maxY = window.innerHeight - 250;
                const newX = Math.random() * maxX - (maxX / 2);
                const newY = Math.random() * maxY - (maxY / 2);

                document.getElementById('container').style.transform = `translate(${newX}px, ${newY}px)`;
                speak("Elegem van!");
                clickCount = 0;
            }
        });

        // Kezdő üzenet
        setTimeout(() => speak("Gnöb vagyok!"), 1000);

    </script>
</body>

</html>
